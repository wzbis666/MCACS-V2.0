# ============================================================
# Minecraft AntiCheat System — Docker Compose 一键部署
#
# 使用方法:
#   1. docker compose up -d
#   2. 将 spigot-plugin/target/minecraft-anticheat-*.jar 复制到
#      Minecraft 服务器的 plugins/ 目录
#   3. 浏览器访问 http://<服务器IP>:55210 打开监控面板
# ============================================================

version: "3.8"

services:
  anticheat-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acs-engine
    restart: unless-stopped
    ports:
      - "55211:55211"   # WebSocket（Spigot 插件连接）
      - "55210:55210"   # 管理后台 + 前端面板
    environment:
      - NODE_ENV=production
      - ACS_AUTH_SECRET=${ACS_AUTH_SECRET:-}
      - TZ=Asia/Shanghai
    volumes:
      - ./data:/app/data           # 持久化检测记录、封禁数据
      - ./penalty-config.yml:/app/penalty-config.yml:ro  # 处罚配置（只读）
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:55210/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - acs-network

  # 可选：使用 Nginx 代理前端面板（生产环境推荐）
  # 如果不使用此服务，前端直接通过 anticheat-engine 的 55210 端口访问
  anticheat-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: acs-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - anticheat-engine
    networks:
      - acs-network
    profiles:
      - full  # 仅在 --profile full 时启用

networks:
  acs-network:
    driver: bridge