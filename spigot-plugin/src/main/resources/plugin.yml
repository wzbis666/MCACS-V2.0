name: AntiCheatMonitor
version: 0.1.0
main: com.anticheat.AntiCheatPlugin
api-version: '1.20'
description: Anti-cheat monitoring system with 3D visualization

commands:
  anticheat:
    description: AntiCheat monitor admin commands
    usage: /anticheat <reload|status>
    permission: anticheat.admin

permissions:
  anticheat.admin:
    description: Allows access to anticheat admin commands
    default: op
